syntax = "proto3";

package api.discover.v1;

import "google/api/annotations.proto";
import "validate/validate.proto";

option go_package = "xiaomiao-home-system/api/discover/v1;v1";
option java_multiple_files = true;
option java_package = "api.discover.v1";
option java_outer_classname = "DiscoverProtoV1";

service Discover {
	// GetDiscoverList 查询发现列表
	rpc GetDiscoverList (GetDiscoverListRequest) returns (GetDiscoverListReply) {
		option (google.api.http) = {
			get: "/api/v1/discover/list",
		};
	}

	// GetDiscoverRecommend 获取发现页推荐
	rpc GetDiscoverRecommend (GetDiscoverRecommendRequest) returns (GetDiscoverRecommendReply) {
		option (google.api.http) = {
			get: "/api/v1/discover/recommend"
		};	
	}

	// GetDiscoverRecommendExcludePostId 获取发现页推荐（排除指定帖子）
	rpc GetDiscoverRecommendExcludePostId (GetDiscoverRecommendRequest) returns (GetDiscoverRecommendReply) {
		option (google.api.http) = {
			get: "/api/v1/discover/recommend/{id}"
		};	
	}

	// GetDiscover 查询发现内容
	rpc GetDiscover (GetDiscoverRequest) returns (GetDiscoverReply) {
		option (google.api.http) = {
			get: "/api/v1/discover/{id}"
		};	
	}
}

// 基础请求体
message BaseRequest {}

// 基础响应体
message BaseResponse {}

message GetDiscoverListRequest {
	int32 page = 1 [(validate.rules).int32 = {gte: 1}];
	int32 size = 2 [(validate.rules).int32 = {gte: 10, lte: 200}];
	int32 province_id = 3 [(validate.rules).int32 = {gte: 0}];
	int32 city_id = 4 [(validate.rules).int32 = {gte: 0}];
	int32 p_type = 5 [(validate.rules).int32 = {gte: 0, lte: 4}];
	int32 c_breed = 6 [(validate.rules).int32 = {gte: 0, lte: 20}];
}

message DiscoverListItem {
	int64 id = 1;
	string title = 2;
	int32 postStatus = 3;
	string coverImage = 4;
	string remark = 5;
	string createdTime = 6;
	string updatedTime = 7;
}

message DiscoverList {
	repeated DiscoverListItem items = 1;
	int64 total = 2;
}

message GetDiscoverListReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	DiscoverList data = 4;
}

message GetDiscoverRequest {
	int64 id = 1 [(validate.rules).int64 = {gt: 0}];
}

message CatInfo {
	int64 id = 1;
	string name = 2;
	int32 catType = 3;
	int32 breedType = 4;
	int32 gender = 5;
	float weight = 6;
}

message UserInfo {
	int64 id = 1;
	string name = 2;
	int32 provinceId = 3;
	int32 cityId = 4;
}

message DiscoverInfo {
    int64 id = 1;
	string title = 2;
	int32 postType = 3;
	CatInfo cat = 4;
	UserInfo user = 5;
	int32 provinceId = 6;
	int32 cityId = 7;
	string lostTime = 8;
	string address = 9;
	string remark = 10;
	string createdTime = 11;
	string updatedTime = 12;
}

message GetDiscoverReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	DiscoverInfo data = 4;
}

message GetDiscoverRecommendRequest {
	int64 id = 1 [(validate.rules).int64 = {gte: 0}];
}

message DiscoverRecommendItem {
	int64 id = 1;
	string title = 2;
	int32 provinceId = 3;
	int32 cityId = 4;
}

message GetDiscoverRecommendReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	repeated DiscoverRecommendItem data = 4;
}
