syntax = "proto3";

package api.file.v1;

import "google/api/annotations.proto";
import "validate/validate.proto";

option go_package = "xiaomiao-home-system/api/file/v1;v1";
option java_multiple_files = true;
option java_package = "api.file.v1";
option java_outer_classname = "FileProtoV1";

service File {
	// 下载文件
	rpc DownloadFile (DownloadFileRequest) returns (DownloadFileReply) {
		option (google.api.http) = {
			get: "/api/v1/file/download",
		};
	}

	// 上传头像
	rpc UploadAvatar (UploadAvatarRequest) returns (UploadAvatarReply) {
		option (google.api.http) = {
			post: "/api/v1/user/avatar/upload"
			body: "*"
		};
	}

	// GetStaticFile
	rpc GetStaticFile (StaticFileRequest) returns (StaticFileReply) {
		option (google.api.http) = {
			get: "/static/{filename}",
		};
	}
}
	
message UploadAvatarRequest {
	// 文件名，如 avatar.png
	string fileName = 1;
	// 文件类型，如 image/png
	string contentType = 2;
	// 文件二进制内容
	bytes content = 3;
}

message ImageInfo {
	string url = 1;
}

message UploadAvatarReply {
	int32 code = 1; 
	string message = 2;
	bool success = 3;
	ImageInfo data = 4;
}

message FileInfo {
	string Id = 1;
	string fileName = 2;
	string fileSuffix = 3;
	string fileType = 4;
	string filePath = 5;
	string fileMd5 = 6;
	int64 fileSize = 7;
}

message DownloadFileRequest {
	string file = 1 [(validate.rules).string = {min_len: 1}];
}

message DownloadFileReply {
	int32 code = 1; 
	string message = 2;
	bool success = 3;
	FileInfo data = 4;
}

message StaticFileRequest {
	string filename = 1;
}

message StaticFileReply {
	bytes data = 1;
}
