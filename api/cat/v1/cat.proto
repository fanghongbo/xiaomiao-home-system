syntax = "proto3";

package api.cat.v1;

import "google/api/annotations.proto";
import "validate/validate.proto";

option go_package = "xiaomiao-home-system/api/cat/v1;v1";
option java_multiple_files = true;
option java_package = "api.cat.v1";
option java_outer_classname = "CatProtoV1";

service Cat {
	// GetCatList 查询小猫列表
	rpc GetCatList (GetCatListRequest) returns (GetCatListReply) {
		option (google.api.http) = {
			get: "/api/v1/cat/list",
		};
	}

	// CreateCat 创建小猫
	rpc CreateCat (CreateCatRequest) returns (CreateCatReply) {
		option (google.api.http) = {
			post: "/api/v1/cat",
			body: "*"
		};	
	}

	// UpdateCat 更新小猫
	rpc UpdateCat (UpdateCatRequest) returns (UpdateCatReply) {
		option (google.api.http) = {
			put: "/api/v1/cat/{id}",
			body: "*"
		};	
	}

	// DeleteCat 删除小猫
	rpc DeleteCat (DeleteCatRequest) returns (DeleteCatReply) {
		option (google.api.http) = {
			delete: "/api/v1/cat/{id}"
		};	
	}
}

// 基础请求体
message BaseRequest {}

// 基础响应体
message BaseResponse {}

message GetCatListRequest {
	int32 page = 1 [(validate.rules).int32 = {gte: 1}];
	int32 size = 2 [(validate.rules).int32 = {gte: 10, lte: 200}];
	int32 c_type = 3 [(validate.rules).int32 = {gte: 0, lte: 20}];
}

message CatListItem {
	int64 id = 1;
	string name = 2;
	int32 gender = 3;
	int32 breedType = 4;
	float weight = 5;
	string birthday = 6;
	int32 neuterStatus = 7;
	int32 healthStatus = 8;
	int32 dewormedStatus = 9;
	int32 vaccineStatus = 10;
	string remark = 11;
}

message CatList {
	repeated CatListItem items = 1;
	int64 total = 2;
}

message GetCatListReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	CatList data = 4;
}

message CreateCatRequest {
	string name = 1 [(validate.rules).string = {min_len: 1, max_len: 64}];
	int32 gender = 2 [(validate.rules).int32 = {gte: 0, lte: 2}];
	int32 catType = 3 [(validate.rules).int32 = {gte: 0, lte: 2}];
	int32 breedType = 4 [(validate.rules).int32 = {gte: 0, lte: 30}];
	float weight = 5 [(validate.rules).float = {gte: 0, lte: 50}];
	string birthday = 6 [(validate.rules).string = {min_len: 1}];
	int32 neuterStatus = 7 [(validate.rules).int32 = {gte: 0, lte: 2}];
	int32 healthStatus = 8 [(validate.rules).int32 = {gte: 0, lte: 4}];
	string healthDesc = 9;
	int32 dewormedStatus = 10 [(validate.rules).int32 = {gte: 0, lte: 2}];
	int32 vaccineStatus = 11 [(validate.rules).int32 = {gte: 0, lte: 3}];
	repeated int32 vaccineTypes = 12;
	string vaccineLastDate = 13;
	string vaccineCertImage = 14;
	string remark = 15 [(validate.rules).string = {min_len: 1, max_len: 500}];
}

message CreateCatReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message UpdateCatRequest {
	int64 id = 1 [(validate.rules).int64 = {gt: 0}];
	string name = 2 [(validate.rules).string = {min_len: 1, max_len: 64}];
	int32 gender = 3 [(validate.rules).int32 = {gte: 0, lte: 2}];
	int32 catType = 4 [(validate.rules).int32 = {gte: 0, lte: 2}];
	int32 breedType = 5 [(validate.rules).int32 = {gte: 0, lte: 30}];
	float weight = 6 [(validate.rules).float = {gte: 0, lte: 50}];
	string birthday = 7 [(validate.rules).string = {min_len: 1}];
	int32 neuterStatus = 8 [(validate.rules).int32 = {gte: 0, lte: 2}];
	int32 healthStatus = 9 [(validate.rules).int32 = {gte: 0, lte: 4}];
	string healthDesc = 10;
	int32 dewormedStatus = 11 [(validate.rules).int32 = {gte: 0, lte: 2}];
	int32 vaccineStatus = 12 [(validate.rules).int32 = {gte: 0, lte: 3}];
	repeated int32 vaccineTypes = 13;
	string vaccineLastDate = 14;
	string vaccineCertImage = 15;
	string remark = 16 [(validate.rules).string = {min_len: 1, max_len: 500}];
}

message UpdateCatReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message DeleteCatRequest {
	int64 id = 1 [(validate.rules).int64 = {gt: 0}];
}

message DeleteCatReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}
