syntax = "proto3";

package api.user.setting.v1;

import "google/api/annotations.proto";
import "validate/validate.proto";

option go_package = "xiaomiao-home-system/api/user/setting/v1;v1";
option java_multiple_files = true;
option java_package = "api.user.setting.v1";
option java_outer_classname = "UserSettingProtoV1";

service UserSetting {
	// 更新基础更新
	rpc UpdateUserBaseSetting (UpdateUserBaseSettingRequest) returns (UpdateUserBaseSettingReply) {
		option (google.api.http) = {
			post: "/api/v1/user/base/setting",
			body: "*"
		};
	}

	// 更新密码
	rpc UpdateUserPassword (UpdateUserPasswordRequest) returns (UpdateUserPasswordReply) {
		option (google.api.http) = {
			post: "/api/v1/user/password",
			body: "*"
		};
	}

	
	// UpdateUserSystemNotifyRecevieSetting 更新用户系统通知
	rpc UpdateUserSystemNotifyRecevieSetting (UpdateUserSystemNotifyRecevieSettingRequest) returns (UpdateUserSystemNotifyRecevieSettingReply) {
		option (google.api.http) = {
			post: "/api/v1/user/system/notify/setting",
			body: "*"
		};
	}

	// UpdateUserInteractNotifyRecevieSetting 更新用户互动通知
	rpc UpdateUserInteractNotifyRecevieSetting (UpdateUserInteractNotifyRecevieSettingRequest) returns (UpdateUserInteractNotifyRecevieSettingReply) {
		option (google.api.http) = {
			post: "/api/v1/user/interact/notify/setting",
			body: "*"
		};
	}

	// UpdateUserAdoptNotifyRecevieSetting 更新用户领养通知
	rpc UpdateUserAdoptNotifyRecevieSetting (UpdateUserAdoptNotifyRecevieSettingRequest) returns (UpdateUserAdoptNotifyRecevieSettingReply) {
		option (google.api.http) = {
			post: "/api/v1/user/adopt/notify/setting",
			body: "*"
		};
	}

	// UpdateUserEmailNotifyRecevieSetting 更新用户邮件通知
	rpc UpdateUserEmailNotifyRecevieSetting (UpdateUserEmailNotifyRecevieSettingRequest) returns (UpdateUserEmailNotifyRecevieSettingReply) {
		option (google.api.http) = {
			post: "/api/v1/user/email/notify/setting",
			body: "*"
		};
	}

	// GetUserNotifySetting 获取用通知设置
	rpc GetUserNotifySetting (GetUserNotifySettingRequest) returns (GetUserNotifySettingReply) {
		option (google.api.http) = {
			get: "/api/v1/user/notify/setting",
		};
	}
}

// 基础请求体
message BaseRequest {}

// 基础响应体
message BaseResponse {}

enum GenderType {
  GENDER_SECRET = 0;      // 保密
  GENDER_MALE = 1;        // 男
  GENDER_FEMALE = 2;      // 女  
}

message UpdateUserBaseSettingRequest {
	string nickname = 1 [(validate.rules).string = {min_len: 1, max_len: 20}];;
	GenderType gender = 2;
	string birthday = 3 [(validate.rules).string = { pattern: "^\\d{4}-\\d{2}-\\d{2}$" }];
	string signature = 4 [(validate.rules).string = {min_len: 0, max_len: 100}];
}

message UpdateUserBaseSettingReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message UpdateUserPasswordRequest {
	string password = 1  [
    (validate.rules).string = {
      min_bytes: 6,    // 最小6位
      max_bytes: 32,   // 最大32位
      
      // PGV 标准正则：不使用(?=)，兼容所有版本
      pattern: "^.*[A-Za-z]+.*[0-9]+.*[^A-Za-z0-9]+.*$|^.*[0-9]+.*[A-Za-z]+.*[^A-Za-z0-9]+.*$|^.*[A-Za-z]+.*[^A-Za-z0-9]+.*[0-9]+.*$|^.*[0-9]+.*[^A-Za-z0-9]+.*[A-Za-z]+.*$|^.*[^A-Za-z0-9]+.*[A-Za-z]+.*[0-9]+.*$|^.*[^A-Za-z0-9]+.*[0-9]+.*[A-Za-z]+.*$"
    }
  ];
}

message UpdateUserPasswordReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message UpdateUserSystemNotifyRecevieSettingRequest {
	int32 enable = 1;
}

message UpdateUserSystemNotifyRecevieSettingReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message UpdateUserInteractNotifyRecevieSettingRequest {
	int32 enable = 1;
}

message UpdateUserInteractNotifyRecevieSettingReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message UpdateUserAdoptNotifyRecevieSettingRequest {
	int32 enable = 1;
}

message UpdateUserAdoptNotifyRecevieSettingReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message UpdateUserEmailNotifyRecevieSettingRequest {
	int32 enable = 1;
}

message UpdateUserEmailNotifyRecevieSettingReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message GetUserNotifySettingRequest {}

message UserNotifySettingInfo {
	int32 system = 1;
	int32 interact = 2;
	int32 adopt = 3;
	int32 email = 4;
}

message GetUserNotifySettingReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	UserNotifySettingInfo data = 4;
}
