syntax = "proto3";

package api.user.v1;

import "google/api/annotations.proto";
import "validate/validate.proto";

option go_package = "xiaomiao-home-system/api/user/v1;v1";
option java_multiple_files = true;
option java_package = "api.user.v1";
option java_outer_classname = "UserProtoV1";

service User {
	// Web登录接口
	rpc WebLogin (WebLoginRequest) returns (WebLoginReply) {
		option (google.api.http) = {
			post: "/api/v1/web/auth/login",
			body: "*"
		};
	};

	// Web登陆检测
	rpc WebCheckLogin (WebCheckLoginRequest) returns (WebCheckLoginReply) {
		option (google.api.http) = {
			get: "/api/v1/web/check/login",
		};
	};

	rpc WebLogout (WebLogoutRequest) returns (WebLogoutReply) {
		option (google.api.http) = {
			get: "/api/v1/web/auth/logout",
		};
	};

	// App登录
	rpc AppLogin (AppLoginRequest) returns (AppLoginReply) {
		option (google.api.http) = {
			post: "/api/v1/app/auth/login",
			body: "*"
		};
	};

	// 小程序登录
	rpc MpLogin (MpLoginRequest) returns (MpLoginReply) {
		option (google.api.http) = {
			post: "/api/v1/mp/auth/login",
			body: "*"
		};
	};

	// 查询用户信息
	rpc GetWebLoginUserInfo (GetWebLoginUserInfoRequest) returns (GetWebLoginUserInfoReply) {
		option (google.api.http) = {
			get: "/api/v1/web/user/info"
		};
	}
}

// 基础请求体
message BaseRequest {}

// 基础响应体
message BaseResponse {}

// 登录类型
enum LoginType {
	LOGIN_TYPE_UNSPECIFIED = 0;
	LOGIN_TYPE_ACCOUNT = 1; // 账号密码 (支持账号|手机号｜邮箱)
	LOGIN_TYPE_SMS = 2;     // 手机验证码
	LOGIN_TYPE_WECHAT = 3;  // 微信授权
	LOGIN_TYPE_QQ = 4;      // QQ授权
}

message WebLoginRequest {
	// 登录方式
	LoginType login_type = 1;

	// 统一身份标识：
	// 账号登录: username
	// 邮箱登录: email
	// 短信登录: mobile
	// 微信登录: unionid/openid
	// QQ登录: openid
	string login_identity = 2 [(validate.rules).string = {min_len: 1, max_len: 191}];

	// 账号/邮箱密码登录时使用（其余方式可不传）
	string password = 3;

	// 短信/邮箱验证码登录时使用（其余方式可不传）
	string verify_code = 4;

	// 第三方平台授权码（微信/QQ 推荐使用）
	string auth_code = 5;
}

message WebLoginInfo {
	string token = 2;
	int64 loginValidPeriod = 3;
}

message WebLoginReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	WebLoginInfo data = 4;
}

message RoleItem {
	int64 id = 1;
	string name = 2;
}

message UserInfo  {
	int64 id = 1;
	string nickname = 2; 
	string avatar = 3;
	int32 gender = 4;
	string birthday = 5;
	string signature = 6;
	int32 status = 7;
	repeated string access_codes = 8;
}

message UserPasswordInfo {
	string slat = 1;
	string password = 2;
}

message AppLoginRequest {}

message AppLoginReply {}

message MpLoginRequest {}

message MpLoginReply {}

message GetWebLoginUserInfoRequest {}

message WebLoginUserInfo {
	int64 id = 1;
	string nickname = 2;
	string avatar = 3;
	int32 gender = 4;
	string birthday = 5;
	string signature = 6;
	repeated string access_codes = 7;
}

message GetWebLoginUserInfoReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	WebLoginUserInfo data = 4;
}

message WebLogoutRequest {}

message WebLogoutReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message WebCheckLoginRequest {}

message WebCheckLoginReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}
