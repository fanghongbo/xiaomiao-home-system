syntax = "proto3";

package api.user.v1;

import "google/api/annotations.proto";
import "validate/validate.proto";

option go_package = "xiaomiao-home-system/api/user/v1;v1";
option java_multiple_files = true;
option java_package = "api.user.v1";
option java_outer_classname = "UserProtoV1";

service User {
	// Login 登录接口
	rpc Login (LoginRequest) returns (LoginReply) {
		option (google.api.http) = {
			post: "/api/v1/user/login",
			body: "*"
		};
	};
}

// 基础请求体
message BaseRequest {}

// 基础响应体
message BaseResponse {}

message LoginRequest {
	string username = 1 [(validate.rules).string = {pattern: "^[a-zA-Z0-9_]+$", min_len: 3}];
	string password = 2 [(validate.rules).string = {min_len: 6}];
	int64 type = 3;
}

message UserMfaInfo {
	string token = 1;
	int64 step = 2;
}

message LoginInfo {
	UserMfaInfo mfa = 1;
	string token = 2;
	int64 loginValidPeriod = 3;
}

message LoginReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	LoginInfo data = 4;
}

message GroupItem {
	int64 id = 1;
	string name = 2;
}

message RoleItem {
	int64 id = 1;
	string name = 2;
}

message UserInfo  {
	int64 id = 1;
	string username = 2;
	string nickname = 3; 
	string avatar = 4;
	string salt = 5;
	string telephone = 6;
	string position = 7;
	string email = 8;
	string bio = 9;
	string signature = 10;
	int64 mfaStatus = 11;
	repeated GroupItem groups = 12;
	repeated RoleItem roles = 13;
	int64 status = 14;
	string remark = 15;
}
