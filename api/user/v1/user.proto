syntax = "proto3";

package api.user.v1;

import "google/api/annotations.proto";
import "validate/validate.proto";

option go_package = "xiaomiao-home-system/api/user/v1;v1";
option java_multiple_files = true;
option java_package = "api.user.v1";
option java_outer_classname = "UserProtoV1";

service User {
	// Login 登录接口
	rpc Login (LoginRequest) returns (LoginReply) {
		option (google.api.http) = {
			post: "/api/v1/user/login",
			body: "*"
		};
	};

	// GetSecretKey 查询加密密钥
	rpc GetSecretKey (GetSecretKeyRequest) returns (GetSecretKeyReply) {
		option (google.api.http) = {
			get: "/api/v1/secret/key",
		};
	};

	// GetLoginUserInfo 查询用户信息
	rpc GetLoginUserInfo (GetLoginUserInfoRequest) returns (GetLoginUserInfoReply) {
		option (google.api.http) = {
			get: "/api/v1/user/info",
		};
	};

	// GetAuthMenuList 查询菜单列表
	rpc GetAuthMenuList (GetAuthMenuListRequest) returns (GetAuthMenuListReply) {
		option (google.api.http) = {
			get: "/api/v1/user/getAuthMenuList",
		};
	};

	// Logout 登出接口
	rpc Logout (LogoutRequest) returns (LogoutReply) {
		option (google.api.http) = {
			post: "/api/v1/user/logout",
			body: "*"
		};
	};

	// GetUsers 查询所有用户
	rpc GetUsers (GetUsersRequest) returns (GetUsersReply) {
		option (google.api.http) = {
			get: "/api/v1/users",
		};
	};

	// GetUserList 查询用户列表
	rpc GetUserList (GetUserListRequest) returns (GetUserListReply) {
		option (google.api.http) = {
			get: "/api/v1/user/list",
		};
	}

	// CreateUser 创建用户
	rpc CreateUser (CreateUserRequest) returns (CreateUserReply) {
		option (google.api.http) = {
			post: "/api/v1/user",
			body: "*"
		};	
	}

	// UpdateUser 更新用户
	rpc UpdateUser (UpdateUserRequest) returns (UpdateUserReply) {
		option (google.api.http) = {
			put: "/api/v1/user/{id}",
			body: "*"
		};	
	}

	// DeleteUser 删除用户
	rpc DeleteUser (DeleteUserRequest) returns (DeleteUserReply) {
		option (google.api.http) = {
			delete: "/api/v1/user/{id}"
		};	
	}

	// UpdateUserStatus 更新用户状态
	rpc UpdateUserStatus (UpdateUserStatusRequest) returns (UpdateUserStatusReply) {
		option (google.api.http) = {
			put: "/api/v1/user/status/{id}",
			body: "*"
		};	
	}

	// GetUserNotifications 查询用户通知
	rpc GetUserNotifications (GetUserNotificationsRequest) returns (GetUserNotificationsReply) {
		option (google.api.http) = {
			get: "/api/v1/user/notifications",
		};
	}

	// UpdateUserNotificationStatus 更新用户消息状态
	rpc UpdateUserNotificationStatus (UpdateUserNotificationStatusRequest) returns (UpdateUserNotificationStatusReply) {
		option (google.api.http) = {
			put: "/api/v1/user/notification/status/{id}",
			body: "*"
		};	
	}

	// UpdateUserAllNotificationStatus 更新用户所有消息状态
	rpc UpdateUserAllNotificationStatus (UpdateUserAllNotificationStatusRequest) returns (UpdateUserAllNotificationStatusReply) {
		option (google.api.http) = {
			post: "/api/v1/user/notification/status",
			body: "*"
		};
	}
}

// 基础请求体
message BaseRequest {}

// 基础响应体
message BaseResponse {}

message LoginRequest {
	string username = 1;
	string password = 2;
	string rememberMe = 3;
}

message LoginReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message GetSecretKeyRequest {
	string _t = 1;
}

message GetSecretKeyReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message GetLoginUserInfoRequest {}

message RoleResourceAclItem {
	string roleName = 1;
	string pattern = 2;
	string resourceCodes = 3;
}

message LoginUserInfo {
	int64 id = 1;
	string name  = 2;
	string username = 3;
	string authenticationType = 4;
	string realUsername = 5;
	string description = 6;
	string permissionLoadTime = 7;
	repeated string resourceList = 8;
	repeated RoleResourceAclItem roleResourceAcls = 9;
}

message GetLoginUserInfoReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	LoginUserInfo data = 4;
}

message GetAuthMenuListRequest {}

message AuthMenuListItem {
	string path = 1;
	string name = 2;
	string title = 3;
	int64 order = 4;
	repeated AuthMenuListItem children = 5;
	bool showQueryData = 6;
}

message GetAuthMenuListReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	repeated AuthMenuListItem data = 4;
}

message LogoutRequest {}

message LogoutReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message GetUsersRequest {
	string name = 1;
}

message UserItem {
	int64 id = 1;
	string username = 2;
	string nickname = 3;
}

message GetUsersReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	repeated UserItem data = 4;
}

message GetUserByNameRequest {
	string username = 1;
}

message GetUserByNameReply {
	int64 id = 1;
	string username = 2;
	string nickname = 3;
	int32 status = 4;
}

message CreateUserRequest {
	string username = 1 [(validate.rules).string = {pattern: "^[a-zA-Z0-9]+$", min_len: 3}];
	string nickname = 2 [(validate.rules).string = {min_len: 1}];
	int32 status = 3;
	string remark = 4;
	repeated int64 roles = 5;
	repeated int64 groups = 6;
}

message CreateUserReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message UpdateUserByNameRequest {
	string username = 1 [(validate.rules).string = {pattern: "^[a-zA-Z0-9]+$", min_len: 3}];
	string nickname = 2;
	int32 status = 3;
}

message GetUserListRequest {
	string username = 1;
	int64 page = 2 [(validate.rules).int64 = {gte: 1}];
	int64 pageSize = 3 [(validate.rules).int64 = {gte: 10, lte: 200}];
	string status = 4;
	string nickname = 5;
	string remark = 6;
	int64 startTime = 7;
	int64 endTime = 8;
}

message UserListItem {
	int64 id = 1;
	string username = 2;
	string nickname = 3;
	int32 status = 4;
	repeated int64 roles = 5;
	repeated int64 groups = 6;
	string remark = 7;
	string createdTime = 8;
	string updatedTime = 9;
}

message UserList {
	repeated UserListItem items = 1;
	int64 total = 2;
}

message GetUserListReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	UserList data = 4;
}

message UpdateUserRequest {
	int64 id = 1 [(validate.rules).int64 = {gt: 0}];
	string username = 2 [(validate.rules).string = {pattern: "^[a-zA-Z0-9]+$", min_len: 3}];
	string nickname = 3 [(validate.rules).string = {min_len: 1}];
	int32 status = 4;
	string remark = 5;
	repeated int64 roles = 6;
	repeated int64 groups = 7;
}

message UpdateUserReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message DeleteUserRequest {
	int64 id = 1 [(validate.rules).int64 = {gt: 0}];
}

message DeleteUserReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message UpdateUserStatusRequest {
	int64 id = 1 [(validate.rules).int64 = {gt: 0}];
	int32 status = 2;
}

message UpdateUserStatusReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message GetUserNotificationsRequest {}

message UserNotificationItem {
	int64 id = 1;
	string title = 2;
    string avatar = 3;
	string type = 4;
    string date = 5;
    string message = 6;
}

message GetUserNotificationsReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	repeated UserNotificationItem data = 4;
}

message UpdateUserNotificationStatusRequest {
	int64 id = 1;
	int32 status = 2;
}

message UpdateUserNotificationStatusReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message UpdateUserAllNotificationStatusRequest {
	int32 status = 1;
}

message UpdateUserAllNotificationStatusReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}
