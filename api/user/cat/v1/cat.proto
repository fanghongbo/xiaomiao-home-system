syntax = "proto3";

package api.user.cat.v1;

import "google/api/annotations.proto";
import "validate/validate.proto";

option go_package = "xiaomiao-home-system/api/user/cat/v1;v1";
option java_multiple_files = true;
option java_package = "api.user.cat.v1";
option java_outer_classname = "UserCatProtoV1";

service UserCat {
	// GetUserCatList 查询用户小猫列表
	rpc GetUserCatList (GetUserCatListRequest) returns (GetUserCatListReply) {
		option (google.api.http) = {
			get: "/api/v1/user/cat/list",
		};
	}

	// CreateUserCat 创建用户小猫
	rpc CreateUserCat (CreateUserCatRequest) returns (CreateUserCatReply) {
		option (google.api.http) = {
			post: "/api/v1/user/cat",
			body: "*"
		};	
	}

	// UpdateUserCat 更新用户小猫
	rpc UpdateUserCat (UpdateUserCatRequest) returns (UpdateUserCatReply) {
		option (google.api.http) = {
			put: "/api/v1/user/cat/{id}",
			body: "*"
		};	
	}

	// DeleteUserCat 删除用户小猫
	rpc DeleteUserCat (DeleteUserCatRequest) returns (DeleteUserCatReply) {
		option (google.api.http) = {
			delete: "/api/v1/user/cat/{id}"
		};	
	}

	// GetUserCat 查询用户小猫信息
	rpc GetUserCat (GetUserCatRequest) returns (GetUserCatReply) {
		option (google.api.http) = {
			get: "/api/v1/user/cat/{id}"
		};	
	}

	// GetUserCats 查询用户所有小猫
	rpc GetUserCats (GetUserCatsRequest) returns (GetUserCatsReply) {
		option (google.api.http) = {
			get: "/api/v1/user/cats"
		};	
	}
}

// 基础请求体
message BaseRequest {}

// 基础响应体
message BaseResponse {}

message GetUserCatListRequest {
	int32 page = 1 [(validate.rules).int32 = {gte: 1}];
	int32 size = 2 [(validate.rules).int32 = {gte: 10, lte: 200}];
	int32 c_type = 3 [(validate.rules).int32 = {gte: 0, lte: 20}];
}

message UserCatListItem {
	int64 id = 1;
	string name = 2;
	int32 gender = 3;
	int32 breedType = 4;
	float weight = 5;
	string birthday = 6;
	int32 neuterStatus = 7;
	int32 healthStatus = 8;
	int32 dewormedStatus = 9;
	int32 vaccineStatus = 10;
	string remark = 11;
}

message UserCatList {
	repeated UserCatListItem items = 1;
	int64 total = 2;
}

message GetUserCatListReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	UserCatList data = 4;
}

message CreateUserCatRequest {
	string name = 1 [(validate.rules).string = {min_len: 1, max_len: 64}];
	int32 gender = 2 [(validate.rules).int32 = {gte: 0, lte: 2}];
	int32 breedType = 3 [(validate.rules).int32 = {gte: 0, lte: 30}];
	float weight = 4 [(validate.rules).float = {gte: 0, lte: 50}];
	string birthday = 5 [(validate.rules).string = {min_len: 1}];
	int32 neuterStatus = 6 [(validate.rules).int32 = {gte: 0, lte: 2}];
	int32 healthStatus = 7 [(validate.rules).int32 = {gte: 0, lte: 4}];
	string healthDesc = 8;
	int32 dewormedStatus = 9 [(validate.rules).int32 = {gte: 0, lte: 2}];
	int32 vaccineStatus = 10 [(validate.rules).int32 = {gte: 0, lte: 3}];
	repeated int32 vaccineTypes = 11;
	string vaccineLastDate = 12;
	string vaccineCertImage = 13;
	string remark = 14 [(validate.rules).string = {min_len: 1, max_len: 500}];
}

message CreateUserCatReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message UpdateUserCatRequest {
	int64 id = 1 [(validate.rules).int64 = {gt: 0}];
	string name = 2 [(validate.rules).string = {min_len: 1, max_len: 64}];
	int32 gender = 3 [(validate.rules).int32 = {gte: 0, lte: 2}];
	int32 breedType = 4 [(validate.rules).int32 = {gte: 0, lte: 30}];
	float weight = 5 [(validate.rules).float = {gte: 0, lte: 50}];
	string birthday = 6 [(validate.rules).string = {min_len: 1}];
	int32 neuterStatus = 7 [(validate.rules).int32 = {gte: 0, lte: 2}];
	int32 healthStatus = 8 [(validate.rules).int32 = {gte: 0, lte: 4}];
	string healthDesc = 9;
	int32 dewormedStatus = 10 [(validate.rules).int32 = {gte: 0, lte: 2}];
	int32 vaccineStatus = 11 [(validate.rules).int32 = {gte: 0, lte: 3}];
	repeated int32 vaccineTypes = 12;
	string vaccineLastDate = 13;
	string vaccineCertImage = 14;
	string remark = 15 [(validate.rules).string = {min_len: 1, max_len: 500}];
}

message UpdateUserCatReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message DeleteUserCatRequest {
	int64 id = 1 [(validate.rules).int64 = {gt: 0}];
}

message DeleteUserCatReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message GetUserCatRequest {
	int64 id = 1 [(validate.rules).int64 = {gt: 0}];
}

message UserCatInfo {
    int64 id = 1;
	string name = 2;
	int32 gender = 3;
	int32 catType = 4;
	int32 breedType = 5;
	float weight = 6;
	string birthday = 7;
	int32 neuterStatus = 8;
	int32 healthStatus = 9;
	string healthDesc = 10;
	int32 dewormedStatus = 11;
	int32 vaccineStatus = 12;
	repeated int32 vaccineTypes = 13;
	string vaccineLastDate = 14;
	string vaccineCertImage = 15;
	string remark = 16;
}

message GetUserCatReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	UserCatInfo data = 4;
}

message GetUserCatsRequest {}

message CatItem {
    int64 id = 1;
	string name = 2;
	int32 gender = 3;
	int32 catType = 4;
	int32 breedType = 5;
}

message GetUserCatsReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	repeated CatItem data = 4;
}
