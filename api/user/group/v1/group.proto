syntax = "proto3";

package api.user.group.v1;

import "google/api/annotations.proto";
import "validate/validate.proto";

option go_package = "xiaomiao-home-system/api/user/group/v1;v1";
option java_multiple_files = true;
option java_package = "api.user.group.v1";
option java_outer_classname = "UserGroupProtoV1";

service UserGroup {
	// GetUserGroupList 查询用户组列表
	rpc GetUserGroupList (GetUserGroupListRequest) returns (GetUserGroupListReply) {
		option (google.api.http) = {
			get: "/api/v1/user/group/list",
		};
	}

	// CreateUserGroup 创建用户组
	rpc CreateUserGroup (CreateUserGroupRequest) returns (CreateUserGroupReply) {
		option (google.api.http) = {
			post: "/api/v1/user/group",
			body: "*"
		};	
	}

	// UpdateUser 更新用户组
	rpc UpdateUserGroup (UpdateUserGroupRequest) returns (UpdateUserGroupReply) {
		option (google.api.http) = {
			put: "/api/v1/user/group/{id}",
			body: "*"
		};	
	}

	// DeleteUserGroup 删除用户组
	rpc DeleteUserGroup (DeleteUserGroupRequest) returns (DeleteUserGroupReply) {
		option (google.api.http) = {
			delete: "/api/v1/user/group/{id}"
		};	
	}

	// UpdateUserGroupStatus 更新用户组状态
	rpc UpdateUserGroupStatus (UpdateUserGroupStatusRequest) returns (UpdateUserGroupStatusReply) {
		option (google.api.http) = {
			put: "/api/v1/user/group/status/{id}",
			body: "*"
		};	
	}

	// GetUserGroups 查询所有用户组
	rpc GetUserGroups (GetUserGroupsRequest) returns (GetUserGroupsReply) {
		option (google.api.http) = {
			get: "/api/v1/user/groups",
		};
	}
}

// 基础请求体
message BaseRequest {}

// 基础响应体
message BaseResponse {}

message GetUserGroupListRequest {
	string groupName = 1;
	int64 page = 2 [(validate.rules).int64 = {gte: 1}];
	int64 pageSize = 3 [(validate.rules).int64 = {gte: 10, lte: 200}];
	string status = 4;
	string remark = 5;
	int64 startTime = 6;
	int64 endTime = 7;
}

message UserGroupListItem {
	int64 id = 1;
	string groupName = 2;
	int32 status = 3;
	repeated int64 roles = 4;
	repeated int64 users = 5;
	int64 userCount = 6;
	string remark = 7;
	string createdTime = 8;
	string updatedTime = 9;
}

message UserGroupList {
	repeated UserGroupListItem items = 1;
	int64 total = 2;
}

message GetUserGroupListReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	UserGroupList data = 4;
}

message CreateUserGroupRequest {
	string groupName = 1 [(validate.rules).string = {min_len: 1}];
	int32 status = 2;
	string remark = 3;
	repeated int64 roles = 4;
	repeated int64 users = 5;
}

message CreateUserGroupReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message UpdateUserGroupRequest {
	int64 id = 1 [(validate.rules).int64 = {gt: 0}];
	string groupName = 2 [(validate.rules).string = {min_len: 1}];
	int32 status = 3;
	string remark = 4;
	repeated int64 roles = 5;
	repeated int64 users = 6;
}

message UpdateUserGroupReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message DeleteUserGroupRequest {
	int64 id = 1 [(validate.rules).int64 = {gt: 0}];
}

message DeleteUserGroupReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message UpdateUserGroupStatusRequest {
	int64 id = 1 [(validate.rules).int64 = {gt: 0}];
	int32 status = 2;
}

message UpdateUserGroupStatusReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message GetUserGroupsRequest {}

message UserGroupItem {
	int64 id = 1;
	string name = 2;
}

message GetUserGroupsReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	repeated UserGroupItem data = 4;
}
