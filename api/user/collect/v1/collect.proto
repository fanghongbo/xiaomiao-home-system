syntax = "proto3";

package api.user.collect.v1;

import "google/api/annotations.proto";
import "validate/validate.proto";

option go_package = "xiaomiao-home-system/api/user/collect/v1;v1";
option java_multiple_files = true;
option java_package = "api.user.collect.v1";
option java_outer_classname = "UserCollectProtoV1";

service UserCollect {
	// GetUserCollectList 查询用户收藏列表
	rpc GetUserCollectList (GetUserCollectListRequest) returns (GetUserCollectListReply) {
		option (google.api.http) = {
			get: "/api/v1/user/collect/list",
		};
	}

	// GetUserCollectTypes 查询用户收藏分类
	rpc GetUserCollectTypes (GetUserCollectTypesRequest) returns (GetUserCollectTypesReply) {
		option (google.api.http) = {
			get: "/api/v1/user/collect/types",
		};
	}

	// AddUserCollect 添加用户收藏
	rpc AddUserCollect (AddUserCollectRequest) returns (AddUserCollectReply) {
		option (google.api.http) = {
			post: "/api/v1/user/collect/add",
			body: "*"
		};
	};

	// CancelUserCollect 取消用户收藏
	rpc CancelUserCollect (CancelUserCollectRequest) returns (CancelUserCollectReply) {
		option (google.api.http) = {
			post: "/api/v1/user/collect/cancel",
			body: "*"
		};
	};

	// GetUserCollectStatus 查询用户收藏状态
	rpc GetUserCollectStatus (GetUserCollectStatusRequest) returns (GetUserCollectStatusReply) {
		option (google.api.http) = {
			get: "/api/v1/user/collect/status",
		};
	}
}

// 基础请求体
message BaseRequest {}

// 基础响应体
message BaseResponse {}

message GetUserCollectListRequest {
	int32 page = 1 [(validate.rules).int32 = {gte: 1}];
	int32 size = 2 [(validate.rules).int32 = {gte: 10, lte: 200}];
	int32 c_type = 3 [(validate.rules).int32 = {gte: 0, lte: 20}];
}

message UserCollectListItem {
	int64 id = 1;
	string title = 2;
	int32 postStatus = 3;
	int32 auditStatus = 4;
	int32 collectStatus = 5;
	string coverImage = 6;
	string remark = 7;
	string createdTime = 8;
	string updatedTime = 9;
}

message UserCollectList {
	repeated UserCollectListItem items = 1;
	int64 total = 2;
}

message GetUserCollectListReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	UserCollectList data = 4;
}

message GetUserCollectTypesRequest {}

message GetUserCollectTypesReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	repeated int32 data = 4;
}

message AddUserCollectRequest {
	int64 id = 1 [(validate.rules).int64 = {gt: 0}];
}

message AddUserCollectReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message CancelUserCollectRequest {
	int64 id = 1 [(validate.rules).int64 = {gt: 0}];
}

message CancelUserCollectReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message GetUserCollectStatusRequest {
	int64 id = 1 [(validate.rules).int64 = {gt: 0}];
}

message UserCollectStatus {
	int32 collect = 1;
}

message GetUserCollectStatusReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	UserCollectStatus data = 4;
}
