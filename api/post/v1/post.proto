syntax = "proto3";

package api.post.v1;

import "google/api/annotations.proto";
import "validate/validate.proto";

option go_package = "xiaomiao-home-system/api/post/v1;v1";
option java_multiple_files = true;
option java_package = "api.post.v1";
option java_outer_classname = "PostProtoV1";

service Post {
	// GetPostList 查询发布内容列表
	rpc GetPostList (GetPostListRequest) returns (GetPostListReply) {
		option (google.api.http) = {
			get: "/api/v1/post/list",
		};
	}

	// CreatePost 创建发布内容
	rpc CreatePost (CreatePostRequest) returns (CreatePostReply) {
		option (google.api.http) = {
			post: "/api/v1/post",
			body: "*"
		};	
	}

	// GetPost 查询发布内容
	rpc GetPost (GetPostRequest) returns (GetPostReply) {
		option (google.api.http) = {
			get: "/api/v1/post/{id}"
		};	
	}

	// UpdatePost 更新发布内容
	rpc UpdatePost (UpdatePostRequest) returns (UpdatePostReply) {
		option (google.api.http) = {
			put: "/api/v1/post/{id}",
			body: "*"
		};	
	}

	// DeletePost 删除发布内容
	rpc DeletePost (DeletePostRequest) returns (DeletePostReply) {
		option (google.api.http) = {
			delete: "/api/v1/post/{id}"
		};	
	}

	// UpdatePostStatus 更新发布内容状态
	rpc UpdatePostStatus (UpdatePostStatusRequest) returns (UpdatePostStatusReply) {
		option (google.api.http) = {
			put: "/api/v1/post/status/{id}",
			body: "*"
		};	
	}
}

// 基础请求体
message BaseRequest {}

// 基础响应体
message BaseResponse {}

message GetPostListRequest {
	int32 page = 1 [(validate.rules).int32 = {gte: 1}];
	int32 size = 2 [(validate.rules).int32 = {gte: 10, lte: 200}];
	int32 p_type = 3 [(validate.rules).int32 = {gte: 0, lte: 4}];
}

message PostListItem {
	int64 id = 1;
	string title = 2;
	int32 postStatus = 3;
	int32 auditStatus = 4;
	string coverImage = 5;
	string remark = 6;
	string createdTime = 7;
	string updatedTime = 8;
}

message PostList {
	repeated PostListItem items = 1;
	int64 total = 2;
}

message GetPostListReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	PostList data = 4;
}

message GetPostRequest {
	int64 id = 1 [(validate.rules).int64 = {gt: 0}];
}

message PostInfo {
    int64 id = 1;
	string title = 2;
	int32 postType = 3;
	int32 provinceId = 4;
	int32 cityId = 5;
	string address = 6;
	string remark = 7;
	int32 catType = 8;
	int32 catBreed = 9;
	int32 catGender = 10;
	string createdTime = 11;
	string updatedTime = 12;
}

message GetPostReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	PostInfo data = 4;
}

message CreatePostRequest {
	string title = 1 [(validate.rules).string = {min_len: 1}];
	int32 postType = 2 [(validate.rules).int32 = { gte: 0, lte: 4 }];
	int32 provinceId = 3 [(validate.rules).int32 = { gte: 0 }];
	int32 cityId = 4 [(validate.rules).int32 = { gte: 0  }];
	string address = 5 [(validate.rules).string = {min_len: 1}];
	string remark = 6 [(validate.rules).string = {min_len: 1}];
	int32 catType = 7 [(validate.rules).int32 = { gte: 1, lte: 2 }];
	int32 catBreed = 8 [(validate.rules).int32 = { gte: 0, lte: 20 }];
	int32 catGender = 9 [(validate.rules).int32 = { gte: 0, lte: 2 }];
}

message CreatePostReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message UpdatePostRequest {
	int64 id = 1 [(validate.rules).int64 = {gt: 0}];
	string title = 2 [(validate.rules).string = {min_len: 1}];
	int32 postType = 3 [(validate.rules).int32 = { gte: 0, lte: 4 }];
	int32 provinceId = 4 [(validate.rules).int32 = { gte: 0 }];
	int32 cityId = 5 [(validate.rules).int32 = { gte: 0  }];
	string address = 6 [(validate.rules).string = {min_len: 1}];
	string remark = 7 [(validate.rules).string = {min_len: 1}];
	int32 catType = 8 [(validate.rules).int32 = { gte: 1, lte: 2 }];
	int32 catBreed = 9 [(validate.rules).int32 = { gte: 0, lte: 20 }];
	int32 catGender = 10 [(validate.rules).int32 = { gte: 0, lte: 2 }];
}

message UpdatePostReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message DeletePostRequest {
	int64 id = 1 [(validate.rules).int64 = {gt: 0}];
}

message DeletePostReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}

message UpdatePostStatusRequest {
	int64 id = 1 [(validate.rules).int64 = {gt: 0}];
	int32 status = 2;
}

message UpdatePostStatusReply {
	int32 code = 1;
	string message = 2;
	bool success = 3;
	string data = 4;
}
